name: Update and Deploy

on:
  schedule:
    # Once a day at 8 AM
    - cron: 0 8 * * *
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  iroh:
    name: Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.1
          bundler-cache: true
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify runtime versions
        run: |
          node --version
          npm --version
      - name: Build blog
        run: bundle exec ruby bin/blog
      - name: Commit Blog Changes and deploy
        run: |
          if git diff --quiet -- data/blog.json; then
            echo "No data/blog.json updates to deploy."
            exit 0
          fi

          if [ ! -z "$(git status --porcelain)" ]; then
            echo "Setting Config for Git"
            git config --global user.email "action@github.com"
            git config --global user.name "GitHub Action"
            bin/deploy "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" "${{ github.repository }}"

            bin/commit.sh "Add new changes for the blog" \
              "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              "${{ github.repository }}" \
              ${{ github.ref }} \
              "data/blog.json"
          fi
